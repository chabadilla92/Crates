services:
  postgres:
    image: postgres:16-alpine
    container_name: crates-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crates
      POSTGRES_PASSWORD: crates_dev_password
      POSTGRES_DB: crates
    ports:
      - "5432:5432"
    volumes:
      - crates_postgres_data:/var/lib/postgresql/data

volumes:
  crates_postgres_data: